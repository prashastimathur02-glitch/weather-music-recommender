<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Music Recommender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <h1>Weather Music Recommender 🎵</h1>
    
    <p class="subtitle">Get music recommendations based on real-time weather.</p>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name">
      <button onclick="getRecommendationButton()">Get Recommendation</button>
       <button onclick="getCurrentLocation()">
        📍 Use My Location
      </button>
    </div>

    <div id="result" class="result-card">
      <p>Enter a city name to get started.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
